name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- WINDOWS: Builds the EXE Installer ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          if ($null -eq $nsi) { exit 0 } # Skip if no NSI found
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)

      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- UNIX/MAC: The "Power User" Build ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Assets
        run: |
          # Find the main script (the engine)
          ENGINE=$(find . -maxdepth 2 -iname "*.sh" | head -n 1)
          cp "$ENGINE" aurora-shell-portable.sh
          chmod +x aurora-shell-portable.sh
          
          # Setup PKG Root
          mkdir -p pkg_root/usr/local/bin
          cp aurora-shell-portable.sh pkg_root/usr/local/bin/aurora-installer

      - name: Build DMG (For GUI Users)
        run: |
          brew install create-dmg
          pkgbuild --root pkg_root \
                   --identifier com.aurora.shell \
                   --version ${{ github.ref_name || 'dev' }} \
                   --install-location / \
                   "Install-Aurora.pkg"
          
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          
          create-dmg \
            --volname "Aurora-Shell" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --icon "Install-Aurora.pkg" 300 200 \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: |
            *.dmg
            aurora-shell-portable.sh

  # --- RELEASE: The Final Handshake ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.dmg
            *.sh
          body: |
            ## 🌈 Aurora-Shell Release [${{ github.ref_name }}]
            
            ### 🛠️ Choose Your Weapon:
            
            **The Shell Way (No Admin Required):**
            1. Download `aurora-shell-portable.sh`
            2. Run: `bash aurora-shell-portable.sh`
            
            **The Windows Way:**
            - Extract `Aurora-Shell-Windows.zip` and run the installer.
            
            **The Mac Way (GUI):**
            - Mount `Aurora-Shell-Mac.dmg` and run the `.pkg`. 
            - *Note: Terminal users should stick to the `.sh` portable build to avoid Gatekeeper.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}