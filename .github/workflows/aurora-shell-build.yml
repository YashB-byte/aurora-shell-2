name: Aurora Release Build
permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Forces GitHub's internal JS actions to run on the newest engine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Beta/Latest)
        uses: actions/setup-node@v4
        with:
          node-version: '24' # This pulls the newest available 24.x build

      - name: Get Version
        id: version
        run: |
          # Now running on Node 24 environment
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.5.1-beta")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ... [PKG and DMG steps remain the same] ...

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Beta/Latest)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.5.1-beta")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ... [NSIS and ZIP steps remain the same] ...

  create-release:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Setup Node.js (Beta/Latest)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AuroraShell-macOS-DMG/*
            AuroraShell-Windows-ZIP/*
          prerelease: ${{ contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
