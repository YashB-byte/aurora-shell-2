name: Aurora-Shell Professional Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- WINDOWS RELEASE JOB ---
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Windows EXE (NSIS)
        shell: powershell
        run: |
          makensis installer.nsi

      - name: Upload Windows Installer
        uses: softprops/action-gh-release@v2
        with:
          files: Aurora-Shell-Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- MACOS RELEASE JOB ---
  macos-release:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: brew install create-dmg

      - name: Build User-Only PKG
        run: |
          mkdir -p payload/usr/local/bin
          cp aurora_theme.sh payload/usr/local/bin/
          pkgbuild --root payload \
                   --identifier com.aurora.shell.user \
                   --version 1.2.1 \
                   --install-location /usr/local/bin \
                   "Install-Aurora.pkg"

      - name: Create Branded DMG
        run: |
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          create-dmg \
            --volname "Aurora-Shell Installer" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 128 \
            --icon "Install-Aurora.pkg" 300 190 \
            --hide-extension "Install-Aurora.pkg" \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - name: Upload Mac Installer
        uses: softprops/action-gh-release@v2
        with:
          files: Aurora-Shell-Mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
