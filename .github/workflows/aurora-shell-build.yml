name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]

jobs:
  # --- WINDOWS: Builds EXE and wraps in ZIP ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)
      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC: Builds PKG and wraps in DMG ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build PKG and wrap in DMG
        run: |
          brew install create-dmg
          
          # 1. Prepare PKG structure
          mkdir -p pkg_root/usr/local/bin
          SCRIPT=$(find . -maxdepth 2 -iname "*install*.sh" | head -n 1)
          cp "$SCRIPT" pkg_root/usr/local/bin/aurora-installer
          chmod +x pkg_root/usr/local/bin/aurora-installer
          
          # 2. Create the PKG (The professional installer box)
          pkgbuild --root pkg_root \
                   --identifier com.aurora.shell \
                   --version 1.2.0 \
                   --install-location / \
                   "Install-Aurora.pkg"
          
          # 3. Create DMG and put the PKG inside it
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          
          # Note: If you have an aurora-bg.png in your repo, 
          # add --background "aurora-bg.png" to the command below.
          create-dmg \
            --volname "Aurora-Shell Installer" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --icon "Install-Aurora.pkg" 300 200 \
            --hide-extension "Install-Aurora.pkg" \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- RELEASE: Requires Manual Approval in "Production" Environment ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production  # CRITICAL: Create 'Production' in Settings > Environments
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.dmg
          body: |
            ## 🌈 Aurora-Shell Official Release
            - **Windows:** Extract the `.zip` and run the `.exe` installer.
            - **macOS:** Open the `.dmg` and double-click the `.pkg` installer.
            
            *Tip: On macOS, right-click the .pkg and select 'Open' to bypass the developer warning.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
