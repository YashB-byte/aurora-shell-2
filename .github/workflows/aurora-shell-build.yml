name: Aurora-Shell CI/CD

on:
  push:
    branches: [ dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- 1. THE ENGINE: BUILD & VERIFY ---
  build-and-test:
    name: Build & Verify (Win/Mac)
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      # WINDOWS ONLY: Build the EXE using the correct marketplace action
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        uses: propellerhead/nsis-action@v1
        with:
          script-file: installer.nsi
          
      # MACOS ONLY: Build User-Level DMG (No Sudo/Admin required)
      - name: Build Mac DMG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg_root
          cp ./install.sh pkg_root/
          # Install-location is set to user home to avoid password prompts
          pkgbuild --root pkg_root --identifier com.aurora.shell --version "5.8.5" --install-location "$HOME/.aurora-shell" "Install-Aurora.pkg"
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            *.exe
            *.dmg

  # --- 2. THE BRIDGE: AUTO-PR TO MAIN ---
  create-pull-request:
    name: Create PR to Main
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only creates a PR when you push to 'dev' and the builds pass
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: dev
          base: main
          title: "🚀 Production Ready (v5.8.5)"
          body: "Verification complete on Windows and macOS. Ready to merge into main."

  # --- 3. THE GATE: PRODUCTION RELEASE ---
  publish-release:
    name: Request Production Release
    needs: build-and-test
    # Only triggers when you push a version tag (e.g., v5.8.5)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    # CRITICAL: This environment MUST have 'Required Reviewers' set in Settings
    environment: Production
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
          body: "🌈 Aurora-Shell Official Release v5.8.5"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}