name: Aurora Release Build
permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.4.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Scripts
        run: |
          mkdir -p dmg-contents
          cp install.sh dmg-contents/
          chmod +x dmg-contents/install.sh

      - name: Create DMG with installer script
        run: |
          hdiutil create -volname "Aurora Shell ${{ steps.version.outputs.version }}" \
                         -srcfolder dmg-contents \
                         -ov -format UDZO \
                         AuroraShell-${{ steps.version.outputs.version }}.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-macOS-DMG
          path: AuroraShell-${{ steps.version.outputs.version }}.dmg

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.4.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP with installer script
        shell: bash
        run: |
          mkdir -p aurora-windows
          cp install.ps1 aurora-windows/
          cp aurora_theme.ps1 aurora-windows/
          cp README.md aurora-windows/
          cd aurora-windows
          7z a ../AuroraShell-${{ steps.version.outputs.version }}-Windows.zip *

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-Windows-ZIP
          path: AuroraShell-${{ steps.version.outputs.version }}-Windows.zip

  create-release:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AuroraShell-macOS-DMG/*
            AuroraShell-Windows-ZIP/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
