name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)
      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DMG
        run: |
          brew install create-dmg
          mkdir -p dist
          SCRIPT=$(find . -maxdepth 2 -iname "*install*.sh" | head -n 1)
          cp "$SCRIPT" dist/
          create-dmg --volname "Aurora-Shell" --window-size 500 300 "Aurora-Shell-Mac.dmg" "dist/"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # THIS ENABLES THE APPROVAL BUTTON:
    environment: Production
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
