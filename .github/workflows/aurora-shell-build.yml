name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- WINDOWS BUILD ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          if ($null -eq $nsi) { exit 1 }
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)
      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC BUILD: User-Domain Only (No Admin) ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Scripts
        run: |
          mkdir -p scripts
          cp ./installer.sh scripts/postinstall
          cp ./aurora_theme.sh scripts/ 2>/dev/null || touch scripts/aurora_theme.sh
          chmod +x scripts/postinstall

      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          mkdir -p pkg_root
          
          # 1. Create the base component
          pkgbuild --root pkg_root \
                   --scripts scripts \
                   --identifier com.aurora.shell.component \
                   --version ${{ github.ref_name || '1.0.0' }} \
                   "Component.pkg"

          # 2. Generate Distribution XML (This is the 'currentuserdirectory=true' equivalent)
          cat <<EOF > distribution.xml
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <pkg-ref id="com.aurora.shell.component"/>
              <options customize="never" require-scripts="true"/>
              <choices-outline>
                  <line choice="default"/>
              </choices-outline>
              <choice id="default" visible="false">
                  <pkg-ref id="com.aurora.shell.component"/>
              </choice>
              <domains enable_anywhere="false" enable_currentUserHome="true" enable_localSystem="false"/>
          </installer-gui-script>
          EOF

          # 3. Build the Product PKG using the XML
          productbuild --distribution distribution.xml \
                       --package-path . \
                       "Install-Aurora.pkg"
          
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          
          create-dmg \
            --volname "Aurora-Shell" \
            --window-pos 200 120 \
            --window-size 600 450 \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- RELEASE ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.dmg
          body: "## 🌈 Aurora-Shell Official Release [${{ github.ref_name }}]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}