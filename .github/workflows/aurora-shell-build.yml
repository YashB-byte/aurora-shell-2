name: aurora-shell builds
permissions:
  contents: write

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build: # macOS-build ✔
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build macOS PKG
        run: |
          mkdir -p build/scripts
          cp install.sh build/scripts/postinstall
          chmod +x build/scripts/postinstall
          pkgbuild --scripts build/scripts --identifier com.yashb.aurora --install-location "$HOME/Library/AuroraShell" --nopayload build/component.pkg
          cat > build/dist.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?><installer-gui-script minSpecVersion="1"><title>Aurora Shell</title><domains enable_localSystem="false" enable_anywhere="false" enable_currentUserHome="true"/><options customize="never" require-scripts="false" rootVolumeOnly="false"/><choices-outline><line choice="default"><line choice="com.yashb.aurora"/></line></choices-outline><choice id="default"/><choice id="com.yashb.aurora" visible="false"><pkg-ref id="com.yashb.aurora"/></choice><pkg-ref id="com.yashb.aurora" onConclusion="none">component.pkg</pkg-ref></installer-gui-script>
          EOF
          productbuild --distribution build/dist.xml --package-path build AuroraShell.pkg
          hdiutil create -volname "Aurora Shell" -srcfolder AuroraShell.pkg -ov -format UDZO AuroraShell-macOS.dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-macOS
          path: AuroraShell-macOS.dmg

  windows-build: # windows-build ✔
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Windows EXE
        run: |
          choco install nsis -y
          makensis installer.nsi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-Windows
          path: AuroraShell-Installer.exe

  publish-release: # waiting for approval ✔ -> creating release ✔
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    environment: Production # Triggers the "waiting for approval" gate
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with: { path: . }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.5.2-build-${{ github.run_number }}
          name: Aurora Shell v4.5.2
          files: |
            AuroraShell-macOS/AuroraShell-macOS.dmg
            AuroraShell-Windows/AuroraShell-Installer.exe
          generate_release_notes: true
          make_latest: true
