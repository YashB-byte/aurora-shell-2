name: Aurora-Shell CI/CD

on:
  push:
    branches: [ dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- 1. BUILD & VERIFY ---
  build-and-test:
    name: Build & Verify (Win/Mac)
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      # FIX: Use a dedicated NSIS action to handle the PATH automatically
      - name: Install NSIS & Build Windows EXE
        if: matrix.os == 'windows-latest'
        uses: x86-64/nsis-actions@v1
        with:
          nsi-conf: installer.nsi
          
      - name: Build Mac DMG (User-Level)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg_root
          cp ./install.sh pkg_root/
          pkgbuild --root pkg_root --identifier com.aurora.shell --version "5.8.3" --install-location "$HOME/.aurora" "Install-Aurora.pkg"
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            *.exe
            *.dmg

  # --- 2. THE AUTO-PR (Only if Dev Build Passes) ---
  create-pull-request:
    name: Create PR to Main
    needs: build-and-test
    runs-on: ubuntu-latest
    # This ensures the PR is only created after dev is updated and verified
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: dev
          base: main
          title: "🚀 Update Main from Dev (v5.8.3)"
          body: "Verification complete on dev. Automatic PR for main branch update."

  # --- 3. THE RELEASE (Production Approval) ---
  publish-release:
    name: Request Production Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}