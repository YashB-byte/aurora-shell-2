name: Aurora-Shell CI/CD

on:
  push:
    branches: [ dev, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  # --- Trigger 1: Manual Button in GitHub UI ---
  workflow_dispatch:
  # --- Trigger 2: External API / Event Trigger ---
  repository_dispatch:
    types: [trigger-aurora-build]

jobs:
  # --- 1. BUILD ENGINE ---
  build-and-test:
    name: Build & Verify
    strategy:
      fail-fast: false 
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /V3 installer.nsi

      - name: Build Mac DMG
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg_root
          cp ./install.sh pkg_root/
          pkgbuild --root pkg_root --identifier com.aurora.shell --version "6.0.6" --install-location "$HOME/.aurora-shell" "Install-Aurora.pkg"
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            *.exe
            *.dmg

  # --- 2. THE BRIDGE (PR TO MAIN) ---
  create-pull-request:
    name: Create PR to Main
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only run if we aren't already on main
    if: github.ref != 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Get Version
        id: get_ver
        run: |
          VER=$(grep -m 1 "VERSION=" install.sh | cut -d'"' -f2)
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated build update v${{ steps.get_ver.outputs.VERSION }}"
          title: "🚀 Production Ready (v${{ steps.get_ver.outputs.VERSION }})"
          body: "Verification complete. Ready for merge to main."
          branch: auto-update-v${{ steps.get_ver.outputs.VERSION }}
          base: main

  # --- 3. THE GATE (RELEASE) ---
  publish-release:
    name: Request Production Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}