name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # --- WINDOWS: NSIS -> (Your Repo's install.ps1) ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build EXE via NSIS
        run: |
          choco install nsis -y
          # Points directly to the installer.nsi already in your repo root
          # Ensure your .nsi is configured to execute 'install.ps1' directly
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 installer.nsi

      - name: Create Zip
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC: Final Fix for Build #246 Error ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare macOS Scripts
        run: |
          mkdir -p scripts pkg_root
          # postinstall (your installer.sh logic)
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          /bin/bash "\$2/Contents/Resources/install.sh"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/

      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          
          # 1. Build Component
          pkgbuild --root pkg_root --scripts scripts --identifier com.aurora.shell.component "Component.pkg"

          # 2. THE PATH FIX for Builds #243 and #246
          # Using an absolute path URI to satisfy productbuild
          ABS_PATH=$(pwd)
          cat <<EOF > distribution.xml
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <pkg-ref id="com.aurora.shell.component" file="file://$ABS_PATH/Component.pkg" auth="none"/>
              <domains enable_currentUserHome="true" />
              <choices-outline><line choice="default"/></choices-outline>
              <choice id="default" visible="false"><pkg-ref id="com.aurora.shell.component"/></choice>
          </installer-gui-script>
          EOF

          # 3. Final Productbuild
          productbuild --distribution distribution.xml --package-path . "Install-Aurora.pkg"
          
          mkdir -p dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg