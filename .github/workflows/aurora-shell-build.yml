name: Aurora Release Build
permissions:
  contents: write
  pull-requests: write # Required to open PRs

on:
  push:
    branches: [ dev ] # Trigger on a development branch instead of main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'

      # ... [Your existing PKG/DMG build steps here] ...

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated aurora build update"
          title: "🚀 Aurora Release: Build v4.5.1-beta"
          body: |
            This PR was automatically generated by GitHub Actions.
            - Updated `install.sh` logic
            - Rebuilt macOS `.pkg` and `.dmg`
            - Verified Node 24 compatibility
          branch: auto-build-release
          base: main # PR will target the main branch
