name: Aurora Release Build
permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.4.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Scripts
        run: |
          mkdir -p build/scripts
          cp install.sh build/scripts/postinstall
          chmod +x build/scripts/postinstall

      - name: Create Component PKG
        run: |
          pkgbuild --scripts build/scripts \
                   --identifier com.yashb.aurora \
                   --version ${{ steps.version.outputs.version }} \
                   --nopayload \
                   build/AuroraShell-component.pkg

      - name: Create Distribution XML
        run: |
          cat > build/distribution.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <title>Aurora Shell</title>
              <organization>com.yashb</organization>
              <domains enable_localSystem="false" enable_anywhere="false" enable_currentUserHome="true"/>
              <options customize="never" require-scripts="false" rootVolumeOnly="true"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.yashb.aurora"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.yashb.aurora" visible="false">
                  <pkg-ref id="com.yashb.aurora"/>
              </choice>
              <pkg-ref id="com.yashb.aurora" onConclusion="none">AuroraShell-component.pkg</pkg-ref>
          </installer-gui-script>
          EOF

      - name: Create Final PKG
        run: |
          productbuild --distribution build/distribution.xml \
                       --package-path build \
                       AuroraShell.pkg

      - name: Create DMG with PKG inside
        run: |
          mkdir -p dmg-contents
          cp AuroraShell.pkg dmg-contents/
          hdiutil create -volname "Aurora Shell ${{ steps.version.outputs.version }}" \
                         -srcfolder dmg-contents \
                         -ov -format UDZO \
                         AuroraShell-${{ steps.version.outputs.version }}.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-macOS-DMG
          path: AuroraShell-${{ steps.version.outputs.version }}.dmg

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.4.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create NSIS Installer Script
        shell: bash
        run: |
          cat > installer.nsi << 'EOF'
          !include "MUI2.nsh"
          
          Name "Aurora Shell"
          OutFile "AuroraShell-Installer.exe"
          InstallDir "$LOCALAPPDATA\AuroraShell"
          RequestExecutionLevel user
          
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          
          !insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "$INSTDIR"
            File "install.ps1"
            File "aurora_theme.ps1"
            File "README.md"
            
            ExecWait 'powershell -ExecutionPolicy Bypass -File "$INSTDIR\install.ps1"'
          SectionEnd
          EOF

      - name: Build EXE with NSIS
        run: |
          choco install nsis -y
          makensis installer.nsi

      - name: Create ZIP with EXE inside
        shell: bash
        run: |
          7z a AuroraShell-${{ steps.version.outputs.version }}-Windows.zip AuroraShell-Installer.exe

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-Windows-ZIP
          path: AuroraShell-${{ steps.version.outputs.version }}-Windows.zip

  create-release:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AuroraShell-macOS-DMG/*
            AuroraShell-Windows-ZIP/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
