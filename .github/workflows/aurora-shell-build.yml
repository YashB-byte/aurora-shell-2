name: Aurora Release Build
permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Get Version
        id: version
        run: |
          VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.5.1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Prepare Scripts
        run: |
          mkdir -p build/scripts
          cp install.sh build/scripts/postinstall
          chmod +x build/scripts/postinstall
      - name: Create Component PKG
        run: |
          pkgbuild --scripts build/scripts \
                   --identifier com.yashb.aurora \
                   --version ${{ steps.version.outputs.version }} \
                   --nopayload \
                   build/AuroraShell-component.pkg
      - name: Create Final PKG
        # FIXED: Added the --package flag to point to the component we just made
        run: |
          productbuild --package build/AuroraShell-component.pkg \
                       --identifier com.yashb.aurora \
                       --version ${{ steps.version.outputs.version }} \
                       AuroraShell.pkg
      - name: Create DMG
        run: |
          mkdir -p dmg-contents
          cp AuroraShell.pkg dmg-contents/
          hdiutil create -volname "Aurora Shell" -srcfolder dmg-contents -ov -format UDZO AuroraShell-macOS.dmg
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-macOS
          path: AuroraShell-macOS.dmg

  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build EXE with NSIS
        run: |
          choco install nsis -y
          cat > installer.nsi << 'EOF'
          !include "MUI2.nsh"
          Name "Aurora Shell"
          OutFile "AuroraShell-Installer.exe"
          InstallDir "$LOCALAPPDATA\AuroraShell"
          RequestExecutionLevel user
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "$INSTDIR"
            File "install.ps1"
            ExecWait 'powershell.exe -ExecutionPolicy Bypass -File "$INSTDIR\install.ps1"'
          SectionEnd
          EOF
          "/c/Program Files (x86)/NSIS/makensis.exe" installer.nsi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-Windows
          path: AuroraShell-Installer.exe

  create-pr:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AuroraShell-macOS
          path: .
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AuroraShell-Windows
          path: .
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: update binaries for all platforms"
          title: "build: aurora-shell update (All Platforms)"
          body: "Automated build compiled on Node 24. Includes both DMG and EXE."
          branch: sys/build-update
          base: main
          delete-branch: true
