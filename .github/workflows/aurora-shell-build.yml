name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build EXE via NSIS
        run: |
          choco install nsis -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 installer.nsi
      - name: Create Zip
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC BUILD (User-Home Targeted) ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare macOS Scripts
        run: |
          mkdir -p scripts pkg_root/.aurora-tmp
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          # Extracts to user home and runs install.sh
          /bin/bash "\$1/.aurora-tmp/install.sh"
          rm -rf "\$1/.aurora-tmp"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/.aurora-tmp/
      
      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          # 1. Build the component
          pkgbuild --root pkg_root --scripts scripts --identifier com.aurora.shell.installer --version "1.3.3" "Component.pkg"
          
          # 2. Distribution file for User-Home approval
          cat <<EOF > distribution.xml
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <pkg-ref id="com.aurora.shell.installer"/>
              <domains enable_currentUserHome="true" enable_anywhere="false" enable_localSystem="false"/>
              <choices-outline><line choice="default"/></choices-outline>
              <choice id="default" visible="false"><pkg-ref id="com.aurora.shell.installer"/></choice>
          </installer-gui-script>
          EOF

          # 3. Final build with absolute path to bypass Build #249 errors
          ABS_PATH=$(pwd)
          productbuild --distribution distribution.xml --package-path "\$ABS_PATH" "Install-Aurora.pkg"
          
          mkdir -p dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"
          
      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- PUBLISH RELEASE (Requires Manual Approval) ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 'Production' # This is the "Approve" Gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Grabs all commits since the last tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log --oneline -n 10)
          else
            CHANGES=$(git log ${PREVIOUS_TAG}..HEAD --oneline)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.dmg
          name: "Aurora-Shell v1.3.3"
          body: |
            ## 🌈 Aurora-Shell Release
            **Version:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}

            ### 📝 Changelog
            ${{ steps.changelog.outputs.log }}

            ### 📦 Installation
            * **Windows:** Extract the ZIP and run the EXE.
            * **macOS:** Open the DMG and run the PKG (Select "Install for me only").
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}