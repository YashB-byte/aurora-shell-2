name: Aurora-Shell CI/CD

on:
  push:
    branches: [ dev ] # Work happens here
    tags: [ 'v*' ]    # Release happens here
  pull_request:
    branches: [ main ] # This monitors the PR from dev -> main
  workflow_dispatch:

jobs:
  # --- 1. BUILD & VERIFY (Ensures dev is stable) ---
  build-and-test:
    name: Build & Verify (Win/Mac)
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          makensis /V3 installer.nsi
          
      - name: Build Mac DMG (User-Level)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg_root
          cp ./install.sh pkg_root/
          pkgbuild --root pkg_root --identifier com.aurora.shell --version "5.8.2" --install-location "$HOME/.aurora" "Install-Aurora.pkg"
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            *.exe
            *.dmg

  # --- 2. THE AUTO-PR (Triggers only after successful dev build) ---
  create-pull-request:
    name: Create PR to Main
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: dev
          base: main
          title: "🚀 Update Main from Dev (v5.8.2)"
          body: "All builds passed on dev. Ready to merge into main for release."

  # --- 3. THE RELEASE (The Manual Approval Request) ---
  publish-release:
    name: Request Production Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    # REQUIRED: You must have an environment named "Production" in Settings
    environment: Production
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
          body: "Official Aurora-Shell Release v5.8.2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}