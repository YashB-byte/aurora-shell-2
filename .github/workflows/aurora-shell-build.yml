name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # --- WINDOWS: Direct to Repo Files ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build EXE via NSIS
        run: |
          choco install nsis -y
          # Points directly to the installer.nsi already in your repo root
          # No wrapper created here.
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 installer.nsi

      - name: Create Zip
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC: The Final Path Fix ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare macOS Scripts
        run: |
          mkdir -p scripts pkg_root
          # postinstall acts as the trigger for your repo's install.sh
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          /bin/bash "\$2/Contents/Resources/install.sh"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/

      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          
          # 1. Build Component (the base layer)
          pkgbuild --root pkg_root --scripts scripts --identifier com.aurora.shell.component --version "1.0.0" "Component.pkg"

          # 2. THE FIX: Explicitly linking the file URI
          # This specifically targets the error in image_5a001e.jpg
          CURRENT_DIR=$(pwd)
          cat <<EOF > distribution.xml
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <pkg-ref id="com.aurora.shell.component" file="file://localhost$CURRENT_DIR/Component.pkg" auth="none"/>
              <domains enable_currentUserHome="true" />
              <choices-outline><line choice="default"/></choices-outline>
              <choice id="default" visible="false"><pkg-ref id="com.aurora.shell.component"/></choice>
          </installer-gui-script>
          EOF

          # 3. Assemble final package
          productbuild --distribution distribution.xml --package-path "$CURRENT_DIR" "Install-Aurora.pkg"
          
          # 4. Wrap in DMG
          mkdir -p dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg