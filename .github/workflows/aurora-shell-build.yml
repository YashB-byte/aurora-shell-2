name: Aurora Release Build
permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  # This is the "Engine Switch"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # This is the Fix: It removes the problem-matcher that triggers the Node warning
      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep "AURORA SYSTEM INSTALLER" install.sh | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' || echo "v4.5.1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Scripts
        run: |
          mkdir -p build/scripts
          cp install.sh build/scripts/postinstall
          chmod +x build/scripts/postinstall

      - name: Create Component PKG
        run: |
          pkgbuild --scripts build/scripts \
                   --identifier com.yashb.aurora \
                   --version ${{ steps.version.outputs.version }} \
                   --nopayload \
                   build/AuroraShell-component.pkg

      - name: Create Distribution XML
        run: |
          cat > build/distribution.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <title>Aurora Shell</title>
              <organization>com.yashb</organization>
              <domains enable_localSystem="false" enable_anywhere="false" enable_currentUserHome="true"/>
              <options customize="never" require-scripts="false" rootVolumeOnly="true"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.yashb.aurora"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.yashb.aurora" visible="false">
                  <pkg-ref id="com.yashb.aurora"/>
              </choice>
              <pkg-ref id="com.yashb.aurora" onConclusion="none">AuroraShell-component.pkg</pkg-ref>
          </installer-gui-script>
          EOF

      - name: Create Final PKG
        run: |
          productbuild --distribution build/distribution.xml \
                       --package-path build \
                       AuroraShell.pkg

      - name: Create DMG
        run: |
          mkdir -p dmg-contents
          cp AuroraShell.pkg dmg-contents/
          hdiutil create -volname "Aurora Shell" \
                         -srcfolder dmg-contents \
                         -ov -format UDZO \
                         AuroraShell-macOS.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-macOS
          path: AuroraShell-macOS.dmg

  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build EXE with NSIS
        run: |
          choco install nsis -y
          cat > installer.nsi << 'EOF'
          !include "MUI2.nsh"
          Name "Aurora Shell"
          OutFile "AuroraShell-Installer.exe"
          InstallDir "$LOCALAPPDATA\AuroraShell"
          RequestExecutionLevel user
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "$INSTDIR"
            File "install.ps1"
            ExecWait 'powershell.exe -ExecutionPolicy Bypass -File "$INSTDIR\install.ps1"'
          SectionEnd
          EOF
          "/c/Program Files (x86)/NSIS/makensis.exe" installer.nsi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraShell-Windows
          path: AuroraShell-Installer.exe

  create-pr:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Silence Node Warnings
        run: echo "::remove-matcher owner=node::"

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build: update aurora binaries"
          title: "build: aurora-shell update"
          body: "Automated build compiled on Node 24 (cleaned environment)."
          branch: sys/build-update
          base: main
          delete-branch: true
