name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows-build:
    name: Windows EXE Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
      - name: Build EXE
        run: makensis /V3 installer.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ./*.exe

  unix-build:
    name: Unix/macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build User-Level DMG
        run: |
          mkdir -p scripts pkg_root
          cp ./install.sh pkg_root/
          
          # Force 'User-Level' domain and relocatable status
          pkgbuild --root pkg_root \
                   --identifier com.aurora.shell \
                   --version "5.7.9" \
                   --install-location "$HOME/.aurora-shell" \
                   "Install-Aurora.pkg"
          
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"
          
      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  publish-release:
    name: Create GitHub Release
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # --- THIS REQUIRES MANUAL APPROVAL IN SETTINGS > ENVIRONMENTS ---
    environment: Production 
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
          body: |
            ## 🌈 Aurora-Shell v5.7.9
            - 🎉 macOS Installer no longer requires Admin/Sudo.
            - 🛡️ Release logic protected by Production Approval Gate.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
